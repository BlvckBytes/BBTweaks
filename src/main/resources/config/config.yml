            {lut.spacer}<br/>
            <&8>➥ <&e>Linksklick <&7>Wert verringern<br/>
            <&8>➥ <&e>{is_floodgate then "Drop" else "Rechtsklick"} <&7>Wert erhöhen<br/>
            {lut.spacer}
      extentDepth:
