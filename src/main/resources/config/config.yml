  setAutoPickupContainerAlreadyMarked: '{lut.main_prefix} <&c>Das von dir gehaltene Item wurde bereits als Auto-Pickup-Behälter gekennzeichnet!'
  setAutoPickupContainerSuccess: '{lut.main_prefix} <&a>Dieses Item ist nun als Auto-Pickup-Behälter gekennzeichnet.'

abSleep:
