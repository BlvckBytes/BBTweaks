          sowie fünf Minuten, gefolgt vom Mittelwert der MSPT<br/>
          (Millisekunden pro Tick) der letzten 5 Sekunden.<br/>
          <br/>
          Um flüssig zu laufen, benötigt Minecraft 20 TPS;<br/>
          niedrigere Werte signalisieren eine Überlastung.<br/>
          <br/>
