            <&8>♦ <&e>Aktueller Filter:<space/>
            <&6 *if="filter_predicate">{filter_predicate}</>
            <&c *else>Nicht gesetzt</><br/>
            {lut.spacer}<br/>
            <&8>➥ <&e>Linksklick <&7>Filter entfernen<br/>
            <&8>➥ <&e>{filter_set_command} <&7>Filter setzen<br/>
            {lut.spacer}
      sneakMode:
        slots: 15
        type: 'LIGHT_BLUE_CONCRETE'
        name: |
          <reset>
            <&8>» <&6>Verhalten beim Sneaken <&8>«
