cLut:
  main_prefix: '<&7>[<&5>BBTweaks<&7>]'
  ping_prefix: '<&7>[<&6>Ping<&7>]'
  uc_prefix: '<&7>[<&6>UC<&7>]'
  back_prefix: '<&7>[<&6>Back<&7>]'
  mechanic_prefix: '<&7>[<&6>Mechanic<&7>]'
  seed_prefix: '<&7>[<&6>Seed<&7>]'
  inv_filter_prefix: '<&7>[<&6>InvFilter<&7>]'
  markers_prefix: '<&7>[<&6>Markierungen<&7>]'
  auto_fly_prefix: '<&7>[<&6>AutoFly<&7>]'
  ntp_prefix: '<&7>[<&6>NTP<&7>]'
  multi_break_prefix: '<&7>[<&6>MultiBreak<&7>]'
  auto_tool_prefix: '<&7>[<&6>AutoTool<&7>]'
  inv_magnet_prefix: '<&7>[<&6>InvMagnet<&7>]'
  getexp_prefix: '<&7>[<&6>GetExp<&7>]'
  sidebar_prefix: '<&7>[<&6>Sidebar<&7>]'
  sign_copier_prefix: '<&7>[<&6>SignCopier<&7>]'
  auto_pickup_container_prefix: '<&7>[<&6>Sammelbox<&7>]'
  list_chunk_tickets_prefix: '<&7>[<&6>ChunkTickets<&7>]'
  bottle_xp_prefix: '<&7>[<&6>BottleXp<&7>]'
  item_data_prefix: '<&7>[<&6>ItemData<&7>]'
  spacer: |
    <container *if="is_floodgate">
      <&8>{"-" ** 45}
    </container>
    <container *else>
      <&8><&m>{" " ** 55}
    </container>
  parameter_description:
    EXTENT_X: 'Durchmesser in <b><u>X</b>-Richtung'
    EXTENT_Y: 'Durchmesser in <b><u>Y</b>-Richtung'
    EXTENT_Z: 'Durchmesser in <b><u>Z</b>-Richtung'
    OFFSET_X: 'Verschiebung in <b><u>X</b>-Richtung'
    OFFSET_Y: 'Verschiebung in <b><u>Y</b>-Richtung'
    OFFSET_Z: 'Verschiebung in <b><u>Z</b>-Richtung'
  parameters:
    type: '{current_parameter eq name then "ORANGE_CONCRETE" else "GRAY_CONCRETE"}'
    name: '<reset><&8>» <&7><&6 *use="current_parameter eq name">{lut.parameter_description[name]} <&8>«'
    lore: |
      <reset>
        <br/>
        {lut.spacer}<br/>
        <&8>♦ <&7>Aktueller Wert: <&e>{env(name)}
        <container *if="env(`{name}_did_exceed_limit`)">
          <space/>
          <&c><i>(Limit)
        </container>
        <br/>
        {lut.spacer}<br/>
        <container *if="current_parameter eq name">
          <&8>➥ <&e>Linksklick <&7>Parameter verringern<br/>
          <container *if="is_floodgate">
            <&8>➥ <&e>Werfen <&7>Parameter erhöhen<br/>
          </container>
          <container *else>
            <&8>➥ <&e>Rechtsklick <&7>Parameter erhöhen<br/>
          </container>
        </container>
        <container *else>
          <&8>➥ <&e>Linksklick <&7>Parameter auswählen<br/>
        </container>
        {lut.spacer}
  seed_display: |
    <hover-text value={<&a>Klicke, um den Seed zu kopieren!}>
      <to-clipboard value=`{seed}`>
        <&a><u>{seed}
  tick_duration_display: |
    <container *if="tick_duration <= 1">
      sofortig
    </container>
    <container *else-if="tick_duration < 20 * 60">
      <number [value]="double(tick_duration) / 20" format="0.0" locale="de_DE" />s
    </container>
    <container
      *else
      *let-seconds="double(tick_duration) / 20"
    >
      <container *if="floor(seconds) neq seconds">≈</container>
      <duration [value]="ceil(seconds) * 1000" units="hms" />
    </container>
  count_display: |
    <separate
      separator={<space/>und<space/>}
      value={
        <container
          *let-stack_count="count / stack_size"
          *if="stack_count > 0"
        >{stack_count} {stack_count eq 1 then "Stack" else "Stacks"}
      }
      value={
        <container
          *let-item_count="count % stack_size"
          *if="item_count > 0"
        >
          {item_count}
          <container *if="has(singular) and has(plural)">
            <space/>{item_count eq 1 then singular else plural}
      }
    />
  tri_state:
    'TRUE': '<&a>An'
    'FALSE': '<&c>Aus'
    'NULL': '<&7>Unbekannt'
  category_name: |
    <reset>
      <&8>» {name} <&8>«
  marker_name: |
    <reset>
      <&8>» {name} <&8>«
  category_lore: |
    <reset>
      <br/>
      {lut.spacer}<br/>
      {description}<br/>
      {lut.spacer}
  marker_lore: |
    <reset>
      <br/>
      {lut.spacer}<br/>
      {description}<br/>
      {lut.spacer}<br/>
      <container *if="command">
        <&8>♦ <&7>Verbundener Befehl: <&e>/{command}
      </container>
      <container *else-if="has_location">
        <&8>♦ <&7>Position: <&e>{x} {y} {z} <&7>(<&e>{world}<&7>)
      </container>
      <container *else>
        <&8>♦ <&7>Position: <&c>Noch nicht gesetzt
      </container>
      <br/>
      {lut.spacer}
  sneak_mode:
    NONE: '<u>Immer</> aktiviert'
    ENABLE_WHILE_SNEAKING: 'Während Sneaken <u>aktiviert</>'
    DISABLE_WHILE_SNEAKING: 'Während Sneaken <u>deaktiviert</>'
  break_dimension:
    WIDTH: 'Breite'
    HEIGHT: 'Höhe'
    DEPTH: 'Tiefe'
  durability_warnings:
    prefix: '<&7>[<&6>Abnutzungswarnung<&7>]'
    chat: |
      {lut.durability_warnings.prefix} <&4><&l>ACHTUNG!</> <&c>Das Item <&4><translate [type_key] /></> liegt bei <&4>{remaining_durability_percentage}% Haltbarkeit</> <&7>(
        <container *if="is_offhand">Zweithand</>
        <container *else>Hotbar-Slot {slot}</>
      )</>.
    title: '<&c>⚠ <&4><&l>Haltbarkeit</> <&c>⚠'
    subtitle: '<&c><translate [type_key] /></> bei <&4>{remaining_durability_percentage}%'
  sidebar:
    playtime_format: |
      <container *let-time_s="time / 20.0">
        <duration
          *if="time_s < 60 * 60 * 24"
          [value]="time_s * 1000"
          units="mh"
          [zeroes]="time_s < 60 then 'm'"
        />
        <duration *else [value]="time_s * 1000" units="hd" />
    job_progression_format: |
      {progression.level},<space/>
      <container *if="progression.current_experience < 1000">
        {progression.current_experience}
      </container>
      <container *else>
        <number [value]="progression.current_experience / 1000.0" format="0.#" locale="de_DE"/>k
      </>
      /
      <container *if="progression.max_experience < 1000">
        {progression.max_experience}
      </container>
      <container *else>
        <number [value]="progression.max_experience / 1000.0" format="0.#" locale="de_DE"/>k
      </>
    sneak_mode:
      NONE: '<&7>Keine Funktion'
      DOUBLE_SNEAK_TOGGLES: '<&a>Doppel-Sneak schaltet an/aus'
      ENABLE_DURING_SNEAK: '<&3>Während sneaken anzeigen'
      DISABLE_DURING_SNEAK: '<&3>Während sneaken ausblenden'
    delimiters_mode:
      NONE: '<&7>Keine Linien'
      TOP_AND_BOTTOM: '<&a>Oberhalb und unterhalb'
      TOP_ONLY: '<&3>Nur oberhalb'
    statistic_renderer: |
      <color [label_style.color.hex] *if="show_label">
        <container *if="show_icon">
          <container *if="is_floodgate and has(floodgate_icon)" [floodgate_icon] />
          <container *else [icon] />
          <space/>
        </container>
        <style [label_style.bold] [label_style.italic] [label_style.underlined]>{label}:</><space/>
      </color>
      <color [value_style.color.hex]>
        <style
          *let-color_override="has(value_color_override) then value_color_override"
          [color]="color_override"
          [bold]="color_override eq null then value_style.bold"
          [italic]="color_override eq null then value_style.italic"
          [underlined]="color_override eq null then value_style.underlined"
        >
          {value}
      </color>
  item_data:
    data_entries: |
      <separate
        empty={<&c>Dieses Item besitzt keine zusätzlichen Daten.}
        separator={<br/>}
        value={
          <container *if="has(repair_cost)">
            <&8>♦ <&7>Reparaturkosten: <&e>{repair_cost}
        }
        value={
          <container *if="has(map_id)">
            <&8>♦ <&7>Kartennummer: <&e>{map_id}
        }
        value={
          <container *if="has(pdc_entries_by_namespace)">
            <&8>♦ <&7>PDC-Werte:<br/>
            <container *for-namespace="pdc_entries_by_namespace" *for-separator={<br/>}>
              - <&e>{namespace}</>: \{<br/>
              <container *for-entry="pdc_entries_by_namespace[namespace]" *for-separator={,<br/>}>
                <&e>{entry.key}={entry.value}
              </container>
              <br/>\}
        }
      />