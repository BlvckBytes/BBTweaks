  setAutoPickupContainerAlreadyMarked: '{lut.main_prefix} <&c>Das von dir gehaltene Item wurde bereits als Auto-Pickup-Behälter gekennzeichnet!'
  setAutoPickupContainerSuccess: '{lut.main_prefix} <&a>Dieses Item ist nun als Auto-Pickup-Behälter gekennzeichnet.'
  setInfiniteWaterbucketNoValidItem: '{lut.main_prefix} <&c>Du hältst keinen Wassereimer in der Hand!'
  setInfiniteWaterbucketAlreadyMarked: '{lut.main_prefix} <&c>Das von dir gehaltene Item wurde bereits als unendlicher Wassereimer gekennzeichnet!'
  setInfiniteWaterbucketSuccess: '{lut.main_prefix} <&a>Dieses Item ist nun als unendlicher Wassereimer gekennzeichnet.'

abSleep:
  thresholdNotYetReached: '<&a>Es sind <&2>{sleeping_count}<&a>/<&2>{threshold_count} <&a>benötigen Spielern im Bett'
  thresholdReached: '<&a>Die Nacht wird durchgeschlafen'

rdBreaker:
  itemName: |
    <reset>
      <#FCD097>Antik-Brecher
  itemLore: |
    <reset>
      <br/>
      <&5>Baut verstärkten Tiefenschiefer (reinforced<br/>
      deepslate) schnell ab und erlaubt es, den<br/>
      Block im Anschluss aufzusammeln.

backOverride:
  playersOnly: '{lut.back_prefix} <&c>Dieser Befehl steht nur Spielern zur Verfügung!'
  noPermission: '{lut.back_prefix} <&c>Dir fehlen die nötigen Rechte, um diesen Befehl benutzen zu können!'
  noLastLocation: '{lut.back_prefix} <&c>Es ist noch keine vorherige Position vorhanden!'
  teleportedBack: '{lut.back_prefix} <&7>Du kehrst zur <&a>vorherigen Position <&7>zurück.'
  backtrackCommand:
    name: 'backtrack'
    aliases:
      - 'bt'
  backtrackAlreadyInASession: '{lut.back_prefix} <&c>Du befindest dich bereits in einer Backtrack-Sitzung!'
  backtrackCancelledDueToExternalTeleport: '{lut.back_prefix} <&c>Du wurdest teleportiert; breche Backtrack-Sitzung ab!'
  backtrackTitle: '<&6>/{label}'
  backtrackSubtitle: |
    <container *if="current_position eq 0">
      <&a>Ursprung
    </container>
    <container *else>
      <&a>{current_position}<&7>/<&a>{total_count}
    </container>
  backtrackActionBar: '<&a>Springen: <&a>Vorwärts <&8>| <&a>Sneaken: <&a>Rückwärts <&8>| <&a>Bewegen: <&a>Verlassen'

furnaceLevel:
  noLevelsStored: '<&7>[XP] Keine Level gespeichert'
  levelsStored: '<&6>[XP] {old_level} → {new_level} <&7>({next_level_progress}% ↑)'

getUuid:
  command:
    name: 'getuuid'
  noPermission: '{lut.main_prefix} <&c>Du hast keinen Zugriff auf diesen Befehl!'
  commandUsage: '{lut.main_prefix} <&c>Benutzung: /{command_label} \<Name>'
  unknownName: '{lut.main_prefix} <&c>Konnte zum Namen <&4>{name} <&c>keine UUID finden!'
  resultMessage: |
    {lut.main_prefix} <&7>Die UUID von <&a>{name} <&7>ist <&a><u>
      <hover-text value={<&a>Klicke, um die UUID zu kopieren!}>
        <to-clipboard value=`{uuid}`>
          {uuid}
    </u><&7>!

ping:
  command:
    name: 'ping'
