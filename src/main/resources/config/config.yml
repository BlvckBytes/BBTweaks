signCopier:
  signCopyCommand:
    name: 'signcopy'
  signEditCommand:
    name: 'signedit'
  alsoHandleCancelledInteractions: true
  skippedChangeEventHandlers:
    - 'com.earth2me.essentials.signs.SignBlockListener'
  playersOnly: '{lut.sign_copier_prefix} <&c>Dieser Befehl steht nur Spielern zur Verfügung!'
  helpScreen: |
    <&8><&m>{" " ** 25}</> <&6>SignCopier <&8><&m>{" " ** 25}</><br/>
    <&7>- <&6>/{label}</> <&e>Edit</> \<<&e>Zeile</>> [<&e>Inhalt</>] - Editiere eine Zeile in deinem Bearbeitungsspeicher (Kurzform: <&6>/{sign_edit_command}</> \<<&e>Zeile</>> [<&e>Inhalt</>])<br/>
    <&7>- <&6>/{label}</> <&e>Edit-Plain</> \<<&e>Zeile</>> [<&e>Inhalt</>] - Editiere eine Zeile, ohne Farbcodes auszuführen<br/>
    <&7>- <&6>/{label}</> <&e>Preview</> - Zeigt den Inhalt deines Bearbeitungsspeichers (Kurzform: <&6>/{sign_edit_command}</> <&e>Preview</>)<br/>
    <&7>- <&6>/{label}</> <&e>Copy</> - Kopiert das aktuell angesehene Schild (Kurzform: Rechtsklick aufs Schild mit Tintensack)<br/>
    <&7>- <&6>/{label}</> <&e>Paste</> - Fügt in das aktuell angesehene Schild ein (Kurzform: Linksklick aufs Schild mit Tintensack)<br/>
    <&7>- <&6>/{label}</> <&e>Clear</> - Leert deinen Bearbeitungsspeicher<br/>
    <&7>- <&6>/{label}</> <&e>Settings</> - Öffne das Einstellungsmenü<br/>
  noSignCopied: '{lut.sign_copier_prefix} <&c>Du hast noch kein Schild durch Rechtsklick mit einem Tintenbeutel kopiert!'
  copiedSignRemoved: '{lut.sign_copier_prefix} <&7>Dein Bearbeitungsspeicher wurde <&a>gelöscht</>.'
  actionEditUsage: '{lut.sign_copier_prefix} <&c>Benutzung: /{label} {action} \<Zeile> [Inhalt]'
  signEditUsage: '{lut.sign_copier_prefix} <&c>Benutzung: /{label} \<Zeile> [Inhalt]'
  malformedLineNumber: '{lut.sign_copier_prefix} <&c>Die Zeilennummer <&4>{input}</> ist keine valide Ganzzahl größer als Null!'
  outOfBoundsLineNumber: '{lut.sign_copier_prefix} <&c>Die Zeilennummer <&4>{line_number}</> ist größer als das Maximum von <&4>{max_line_number}</>!'
  setLineToBlank: '{lut.sign_copier_prefix} <&7>Die Zeile <&a>{line_number}</> wurde <&a>geleert</>.'
  setLineToContents: '{lut.sign_copier_prefix} <&7>Der Inhalt von Zeile <&a>{line_number}</> wurde auf "{contents}" gesetzt.'
  previewScreen: |
    <&8><&m>{" " ** 25}</> <&6>Bearbeitungsspeicher <&8><&m>{" " ** 25}</><br/>
    <container *for-line="lines" *for-separator={<br/>}>
      <suggest-command value=`{line.edit_command}`>
        <hover-text value={<&a>Klicke, um einen Editierungsbefehl vorgeschlagen zu bekommen}>
          <&7><u>Zeile {loop.index + 1}:</u> {line.render}
    </container>
  signCopied: '{lut.sign_copier_prefix} <&7>Der Inhalt des Schildes bei <&a>{x} {y} {z}</> wurde in deinen Bearbeitungsspeichers kopiert.'
  signPasted: '{lut.sign_copier_prefix} <&7>Der Inhalt deines Bearbeitungsspeichers wurde am Schild bei <&a>{x} {y} {z}</> eingefügt.'
  signPasteWasCancelled: '{lut.sign_copier_prefix} <&c>Das Einfügen des Schildes bei <&4>{x} {y} {z}</> wurde verweigert; bestehen Baurechte?'
  notLookingAtSign: '{lut.sign_copier_prefix} <&c>Du siehst aktuell kein Schild an!'
  settingsDisplay:
    title: '<&8>SignCopier-Einstellungen'
    rows: 3
    items:
      filler:
        type: BLACK_STAINED_GLASS_PANE
        name: ' '
        slots: '0..last_slot'
      pasteSignColor:
        slots: 10
        type: '{paste_sign_color then "GREEN_CONCRETE" else "LIGHT_GRAY_CONCRETE"}'
        name: |
          <reset>
            <&8>» <&7><&a *use="paste_sign_color">Schildfarbe einfügen</> <&8>«
        lore: |
          <reset>
            <br/>
            <&7>Gibt an, ob der Farbstoff, welcher am<br/>
            kopierten Schild benutzt wurde, eingefügt<br/>
            werden soll.<br/>
            {lut.spacer}<br/>
            <&8>➥ <&e>Linksklick <&7>Funktion {paste_sign_color then "deaktivieren" else "aktivieren"}<br/>
            {lut.spacer}
      pasteSignGlowing:
        slots: 11
        type: '{paste_sign_glowing then "GREEN_CONCRETE" else "LIGHT_GRAY_CONCRETE"}'
        name: |
          <reset>
            <&8>» <&7><&a *use="paste_sign_glowing">Leuchten einfügen</> <&8>«
        lore: |
          <reset>
            <br/>
            <&7>Gibt an, ob das Leuchten, welches durch<br/>
            einen Leuchttintenbeutel am kopierten Schild<br/>
            gesetzt wurde, eingefügt werden soll.<br/>
            {lut.spacer}<br/>
            <&8>➥ <&e>Linksklick <&7>Funktion {paste_sign_glowing then "deaktivieren" else "aktivieren"}<br/>
            {lut.spacer}
      sendCopiedMessage:
        slots: 12
        type: '{send_copied_message then "GREEN_CONCRETE" else "LIGHT_GRAY_CONCRETE"}'
        name: |
          <reset>
            <&8>» <&7><&a *use="send_copied_message">Empfang von Kopiernachrichten</> <&8>«
        lore: |
          <reset>
            <br/>
            <&7>Gibt an, ob du Bestätigungsnachrichten<br/>
            beim Kopieren eines Schildes erhältst.<br/>
            {lut.spacer}<br/>
            <&8>➥ <&e>Linksklick <&7>Funktion {send_copied_message then "deaktivieren" else "aktivieren"}<br/>
            {lut.spacer}
      sendPastedMessage:
        slots: 13
        type: '{send_pasted_message then "GREEN_CONCRETE" else "LIGHT_GRAY_CONCRETE"}'
        name: |
          <reset>
            <&8>» <&7><&a *use="send_pasted_message">Empfang von Einfügenachrichten</> <&8>«
        lore: |
          <reset>
            <br/>
            <&7>Gibt an, ob du Bestätigungsnachrichten<br/>
            beim Einfügen eines Schildes erhältst.<br/>
            {lut.spacer}<br/>
            <&8>➥ <&e>Linksklick <&7>Funktion {send_pasted_message then "deaktivieren" else "aktivieren"}<br/>
            {lut.spacer}
      inkSacAsShortcut:
        slots: 14
        type: '{ink_sac_as_shortcut then "GREEN_CONCRETE" else "LIGHT_GRAY_CONCRETE"}'
        name: |
          <reset>
            <&8>» <&7><&a *use="ink_sac_as_shortcut">Tintensack als Kurzform</> <&8>«
        lore: |
          <reset>
            <br/>
            <&7>Gibt an, ob du mit einem Tintensack in der<br/>
            Hand durch Rechtsklick ein Schild kopieren und<br/>
            durch Linksklick wieder einfügen kannst.<br/>
            {lut.spacer}<br/>
            <&8>➥ <&e>Linksklick <&7>Funktion {ink_sac_as_shortcut then "deaktivieren" else "aktivieren"}<br/>
            {lut.spacer}
      pasteAdditionalAttributes:
        slots: 15
        type: '{paste_additional_attributes then "GREEN_CONCRETE" else "LIGHT_GRAY_CONCRETE"}'
        name: |
          <reset>
            <&8>» <&7><&a *use="paste_additional_attributes">Zusatzattribute einfügen</> <&8>«
        lore: |
          <reset>
            <br/>
            <&7>Gibt an, ob unsichtbare Zusatzattribute,<br/>
            welche am kopierten Schild gesetzt wurden<br/>
            (Prädikate, etc.), eingefügt werden sollen.<br/>
            {lut.spacer}<br/>
            <&8>➥ <&e>Linksklick <&7>Funktion {paste_additional_attributes then "deaktivieren" else "aktivieren"}<br/>
            {lut.spacer}

